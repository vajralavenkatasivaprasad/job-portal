<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-left">
        <div class="auth-brand">
            <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span> JobPortal</a>
        </div>
        <div class="auth-left-content">
            <h2>Join thousands of professionals.</h2>
            <p>Students find jobs. Employers find talent. Everyone wins.</p>
            <div class="auth-features">
                <div class="af-item">✓ Free to join, always</div>
                <div class="af-item">✓ Upload resume in seconds</div>
                <div class="af-item">✓ Apply to multiple jobs</div>
                <div class="af-item">✓ Get real-time status updates</div>
            </div>
        </div>
    </div>

    <div class="auth-right">
        <div class="auth-card auth-card-wide">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-sub">Already have one? <a th:href="@{/login}">Sign in</a></p>

            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" th:object="${registerDto}" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Role Toggle -->
                <div class="form-group">
                    <label class="form-label">I am a...</label>
                    <div class="role-toggle">
                        <label class="role-option">
                            <input type="radio" name="role" value="STUDENT" checked>
                            <span class="role-btn">🎓 Student / Job Seeker</span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="EMPLOYER">
                            <span class="role-btn">🏢 Employer / Company</span>
                        </label>
                    </div>
                    <div class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-input" placeholder="Your full name" required>
                        <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="text" th:field="*{phone}" class="form-input" placeholder="+91 9876543210">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-input" placeholder="you@example.com" required>
                    <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <!-- Employer-only field -->
                <div class="form-group employer-field" style="display:none">
                    <label class="form-label">Company Name</label>
                    <input type="text" th:field="*{companyName}" class="form-input" placeholder="Your company name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-input" placeholder="Min 6 characters" required>
                        <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-input" placeholder="Repeat password" required>
                        <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
    document.querySelectorAll('input[name="role"]').forEach(radio => {
        radio.addEventListener('change', () => {
            const empField = document.querySelector('.employer-field');
            empField.style.display = radio.value === 'EMPLOYER' ? 'block' : 'none';
        });
    });
</script>
</body>
</html>
