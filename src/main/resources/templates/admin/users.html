<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Manage Users – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="dashboard-body">
<nav class="navbar navbar-dashboard">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}" class="nav-link">← Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="flash-container" th:if="${success}"><div class="flash flash-success" th:text="${success}"></div></div>
<div class="dashboard-layout">
    <aside class="dash-sidebar">
        <div class="dash-profile-mini">
            <div class="avatar admin-avatar">A</div>
            <div><div class="dash-name">Admin Panel</div><div class="dash-role">Super Admin</div></div>
        </div>
        <nav class="dash-nav">
            <a th:href="@{/admin/dashboard}" class="dash-nav-item">🏠 Dashboard</a>
            <a th:href="@{/admin/users}" class="dash-nav-item active">👥 Manage Users</a>
            <a th:href="@{/admin/jobs}" class="dash-nav-item">💼 Manage Jobs</a>
        </nav>
    </aside>
    <main class="dash-main">
        <div class="dash-section-header" style="margin-bottom:20px">
            <div><h1 style="font-family:var(--font-head);font-size:1.5rem;font-weight:800">Manage Users</h1><p style="color:var(--gray-500)" th:text="${users.size()} + ' users'"></p></div>
        </div>

        <!-- Role filter -->
        <div class="filter-bar" style="margin-bottom:16px">
            <input type="text" id="tableSearch" class="form-input" placeholder="Search by name or email..." style="max-width:280px">
            <a th:href="@{/admin/users}" class="btn btn-sm btn-ghost">All</a>
            <a th:href="@{/admin/users(role=STUDENT)}" class="btn btn-sm btn-ghost">Students</a>
            <a th:href="@{/admin/users(role=EMPLOYER)}" class="btn btn-sm btn-ghost">Employers</a>
        </div>

        <div class="admin-table-card">
            <table class="data-table">
                <thead>
                    <tr><th>Name</th><th>Email</th><th>Role</th><th>Company/Skills</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td><strong th:text="${u.fullName}">Name</strong></td>
                        <td th:text="${u.email}">Email</td>
                        <td>
                            <span th:class="${u.role.name() == 'STUDENT'} ? 'badge badge-success' : (${u.role.name() == 'EMPLOYER'} ? 'badge badge-warning' : 'badge')"
                                  th:text="${u.role}">Role</span>
                        </td>
                        <td>
                            <span th:if="${u.role.name() == 'EMPLOYER'}" th:text="${u.companyName ?: '-'}">Company</span>
                            <span th:if="${u.role.name() == 'STUDENT'}" style="font-size:.8rem" th:text="${#strings.abbreviate(u.skills ?: '-', 40)}">Skills</span>
                            <span th:if="${u.role.name() == 'ADMIN'}">-</span>
                        </td>
                        <td>
                            <span th:class="${u.enabled} ? 'badge badge-success' : 'badge badge-gray'"
                                  th:text="${u.enabled} ? 'Active' : 'Disabled'">Active</span>
                        </td>
                        <td th:text="${u.createdAt != null} ? ${#temporals.format(u.createdAt,'dd MMM yy')} : 'N/A'">Date</td>
                        <td>
                            <div style="display:flex;gap:6px">
                                <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-ghost"
                                            th:text="${u.enabled} ? 'Disable' : 'Enable'">Toggle</button>
                                </form>
                                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline"
                                      onsubmit="return confirm('Permanently delete this user?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
