<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Manage Jobs – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="dashboard-body">
<nav class="navbar navbar-dashboard">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}" class="nav-link">← Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="flash-container" th:if="${success}"><div class="flash flash-success" th:text="${success}"></div></div>
<div class="dashboard-layout">
    <aside class="dash-sidebar">
        <div class="dash-profile-mini">
            <div class="avatar admin-avatar">A</div>
            <div><div class="dash-name">Admin Panel</div><div class="dash-role">Super Admin</div></div>
        </div>
        <nav class="dash-nav">
            <a th:href="@{/admin/dashboard}" class="dash-nav-item">🏠 Dashboard</a>
            <a th:href="@{/admin/users}" class="dash-nav-item">👥 Manage Users</a>
            <a th:href="@{/admin/jobs}" class="dash-nav-item active">💼 Manage Jobs</a>
        </nav>
    </aside>
    <main class="dash-main">
        <div class="dash-section-header" style="margin-bottom:20px">
            <div><h1 style="font-family:var(--font-head);font-size:1.5rem;font-weight:800">Manage Jobs</h1><p style="color:var(--gray-500)" th:text="${jobs.size()} + ' total jobs'"></p></div>
        </div>
        <div class="filter-bar" style="margin-bottom:16px">
            <input type="text" id="tableSearch" class="form-input" placeholder="Search jobs..." style="max-width:300px">
        </div>
        <div class="admin-table-card">
            <table class="data-table">
                <thead>
                    <tr><th>Title</th><th>Company</th><th>Category</th><th>Location</th><th>Applicants</th><th>Status</th><th>Posted</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="job : ${jobs}">
                        <td><strong><a th:href="@{/jobs/{id}(id=${job.id})}" th:text="${job.title}" target="_blank">Title</a></strong></td>
                        <td th:text="${job.companyName}">Company</td>
                        <td><span class="jtag" th:text="${job.category?.name().replace('_',' ')}">Cat</span></td>
                        <td th:text="${job.location}">Location</td>
                        <td th:text="${job.applications.size()}">0</td>
                        <td><span th:class="${job.active} ? 'badge badge-success' : 'badge badge-gray'"
                                  th:text="${job.active} ? 'Active' : 'Inactive'">Active</span></td>
                        <td th:text="${job.createdAt != null} ? ${#temporals.format(job.createdAt,'dd MMM yy')} : 'N/A'">Date</td>
                        <td>
                            <form th:action="@{/admin/jobs/{id}/delete(id=${job.id})}" method="post" style="display:inline"
                                  onsubmit="return confirm('Remove this job?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
