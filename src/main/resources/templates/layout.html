<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'JobPortal'">JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand">
            <span class="brand-icon">◈</span>
            <span>JobPortal</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/jobs}" class="nav-link">Browse Jobs</a>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-link">Login</a>
                <a th:href="@{/register}" class="btn btn-primary btn-sm">Get Started</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="nav-auth">
                <span sec:authorize="hasRole('STUDENT')">
                    <a th:href="@{/student/dashboard}" class="nav-link">Dashboard</a>
                    <a th:href="@{/student/applications}" class="nav-link">My Applications</a>
                </span>
                <span sec:authorize="hasRole('EMPLOYER')">
                    <a th:href="@{/employer/dashboard}" class="nav-link">Dashboard</a>
                    <a th:href="@{/employer/jobs}" class="nav-link">My Jobs</a>
                </span>
                <span sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/dashboard}" class="nav-link">Admin</a>
                </span>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
                </form>
            </div>
        </div>
        <button class="nav-toggle" onclick="toggleNav()">☰</button>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div class="flash-container" th:if="${success != null or error != null or message != null}">
    <div class="flash flash-success" th:if="${success}" th:text="${success}"></div>
    <div class="flash flash-error" th:if="${error}" th:text="${error}"></div>
    <div class="flash flash-info" th:if="${message}" th:text="${message}"></div>
</div>

<!-- PAGE CONTENT -->
<main th:replace="${content}">
    <!-- content here -->
</main>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-brand">
            <span class="brand-icon">◈</span> JobPortal
            <p>Connecting talent with opportunity.</p>
        </div>
        <div class="footer-links">
            <a th:href="@{/jobs}">Browse Jobs</a>
            <a th:href="@{/register}">Register</a>
            <a th:href="@{/login}">Login</a>
        </div>
        <p class="footer-copy">© 2025 JobPortal. Built with Spring Boot.</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
