<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="dashboard-body">

<nav class="navbar navbar-dashboard">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/student/dashboard}" class="nav-link">Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="flash-container" th:if="${success}"><div class="flash flash-success" th:text="${success}"></div></div>
<div class="flash-container" th:if="${error}"><div class="flash flash-error" th:text="${error}"></div></div>

<div class="dashboard-layout">
    <aside class="dash-sidebar">
        <div class="dash-profile-mini">
            <div class="avatar" th:text="${user.fullName?.charAt(0)}">R</div>
            <div><div class="dash-name" th:text="${user.fullName}">Name</div><div class="dash-role">Job Seeker</div></div>
        </div>
        <nav class="dash-nav">
            <a th:href="@{/student/dashboard}" class="dash-nav-item">🏠 Dashboard</a>
            <a th:href="@{/jobs}" class="dash-nav-item">🔍 Browse Jobs</a>
            <a th:href="@{/student/applications}" class="dash-nav-item">📋 My Applications</a>
            <a th:href="@{/student/profile}" class="dash-nav-item active">👤 Edit Profile</a>
        </nav>
    </aside>

    <main class="dash-main">
        <div class="dash-welcome"><h1>Edit Profile</h1></div>

        <div class="profile-grid">
            <!-- PROFILE FORM -->
            <div class="form-card">
                <h2>Personal Information</h2>
                <form th:action="@{/student/profile}" method="post" th:object="${user}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="fullName" th:value="${user.fullName}" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" th:value="${user.phone}" class="form-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" th:value="${user.location}" class="form-input" placeholder="City, State">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Profile Summary</label>
                        <textarea name="profileSummary" class="form-input" rows="4"
                                  placeholder="Brief summary of your background and goals..." th:text="${user.profileSummary}"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Skills (comma-separated)</label>
                        <input type="text" name="skills" th:value="${user.skills}" class="form-input"
                               placeholder="Java, Spring Boot, MySQL, React...">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Experience</label>
                            <input type="text" name="experience" th:value="${user.experience}" class="form-input" placeholder="e.g. 2 years / Fresher">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Education</label>
                            <input type="text" name="education" th:value="${user.education}" class="form-input" placeholder="B.Tech CSE, 2024">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">LinkedIn URL</label>
                            <input type="url" name="linkedinUrl" th:value="${user.linkedinUrl}" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">GitHub URL</label>
                            <input type="url" name="githubUrl" th:value="${user.githubUrl}" class="form-input">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </form>
            </div>

            <!-- RESUME UPLOAD -->
            <div class="form-card">
                <h2>Resume</h2>
                <div th:if="${user.resumePath != null}" class="resume-current">
                    <div class="resume-icon">📄</div>
                    <div>
                        <p><strong>Resume uploaded</strong></p>
                        <a th:href="${user.resumePath}" target="_blank" class="link-btn">Download / View</a>
                    </div>
                </div>
                <div th:unless="${user.resumePath != null}" class="resume-placeholder">
                    <div class="resume-icon">📭</div>
                    <p>No resume uploaded yet. Upload a PDF or Word doc.</p>
                </div>
                <form th:action="@{/student/resume/upload}" method="post" enctype="multipart/form-data" class="upload-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="file-drop-zone" onclick="document.getElementById('resumeFile').click()">
                        <span>📁 Click to select file</span>
                        <small>PDF, DOC, DOCX – Max 10MB</small>
                    </div>
                    <input type="file" id="resumeFile" name="resumeFile" accept=".pdf,.doc,.docx" required
                           onchange="showFileName(this)" style="display:none">
                    <div id="fileName" class="file-name-display" style="display:none"></div>
                    <button type="submit" class="btn btn-primary" style="margin-top:1rem">Upload Resume</button>
                </form>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function showFileName(input) {
    const display = document.getElementById('fileName');
    if (input.files.length > 0) {
        display.textContent = '✓ ' + input.files[0].name;
        display.style.display = 'block';
    }
}
</script>
</body>
</html>
