<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Applications – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="dashboard-body">

<nav class="navbar navbar-dashboard">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/jobs}" class="nav-link">Browse Jobs</a>
            <a th:href="@{/student/dashboard}" class="nav-link">Dashboard</a>
            <a th:href="@{/student/profile}" class="nav-link">Profile</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="flash-container" th:if="${success}"><div class="flash flash-success" th:text="${success}"></div></div>

<div class="dashboard-layout">
    <aside class="dash-sidebar">
        <div class="dash-profile-mini">
            <div class="avatar" th:text="${user.fullName?.charAt(0)}">R</div>
            <div><div class="dash-name" th:text="${user.fullName}">Name</div><div class="dash-role">Job Seeker</div></div>
        </div>
        <nav class="dash-nav">
            <a th:href="@{/student/dashboard}" class="dash-nav-item">🏠 Dashboard</a>
            <a th:href="@{/jobs}" class="dash-nav-item">🔍 Browse Jobs</a>
            <a th:href="@{/student/applications}" class="dash-nav-item active">📋 My Applications</a>
            <a th:href="@{/student/profile}" class="dash-nav-item">👤 Edit Profile</a>
        </nav>
    </aside>

    <main class="dash-main">
        <div class="dash-welcome">
            <h1>My Applications</h1>
            <p th:text="${applications.size()} + ' total applications'">0 total</p>
        </div>

        <!-- FILTER BAR -->
        <div class="filter-bar">
            <input type="text" id="appSearch" class="form-input" placeholder="Search by job title or company..." oninput="filterApps()">
            <select id="statusFilter" class="form-input" onchange="filterApps()">
                <option value="">All Statuses</option>
                <option value="APPLIED">Applied</option>
                <option value="UNDER_REVIEW">Under Review</option>
                <option value="SHORTLISTED">Shortlisted</option>
                <option value="INTERVIEW_SCHEDULED">Interview Scheduled</option>
                <option value="OFFERED">Offered</option>
                <option value="REJECTED">Rejected</option>
                <option value="WITHDRAWN">Withdrawn</option>
            </select>
        </div>

        <div th:if="${applications.empty}" class="empty-state large">
            <div class="empty-icon">📭</div>
            <h3>No applications yet</h3>
            <p>Start applying to jobs to see them here.</p>
            <a th:href="@{/jobs}" class="btn btn-primary">Browse Jobs</a>
        </div>

        <div id="appsContainer" th:unless="${applications.empty}">
            <div class="app-card" th:each="app : ${applications}"
                 th:attr="data-title=${app.job.title},data-company=${app.job.companyName},data-status=${app.status.name()}">
                <div class="app-card-left">
                    <div class="app-company-icon" th:text="${app.job.companyName?.charAt(0)}">T</div>
                    <div class="app-info">
                        <h3 class="app-job-title">
                            <a th:href="@{/jobs/{id}(id=${app.job.id})}" th:text="${app.job.title}">Title</a>
                        </h3>
                        <p th:text="${app.job.companyName} + ' · ' + ${app.job.location}">Company</p>
                        <p class="app-date" th:text="'Applied ' + ${#temporals.format(app.appliedAt, 'dd MMM yyyy')}">Date</p>
                    </div>
                </div>
                <div class="app-card-right">
                    <span th:class="'status-badge status-' + ${app.status.name().toLowerCase().replace('_','-')}"
                          th:text="${app.status.name().replace('_',' ')}">Status</span>
                    <div class="app-note" th:if="${app.employerNote != null}">
                        <small><em>Note: </em><span th:text="${app.employerNote}">Note</span></small>
                    </div>
                    <form th:if="${app.status.name() != 'WITHDRAWN' and app.status.name() != 'REJECTED'}"
                          th:action="@{/student/applications/{id}/withdraw(id=${app.id})}" method="post"
                          onsubmit="return confirm('Withdraw this application?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-danger-ghost">Withdraw</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function filterApps() {
    const search = document.getElementById('appSearch').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    document.querySelectorAll('.app-card').forEach(card => {
        const title = card.dataset.title?.toLowerCase() || '';
        const company = card.dataset.company?.toLowerCase() || '';
        const cardStatus = card.dataset.status || '';
        const matchesSearch = title.includes(search) || company.includes(search);
        const matchesStatus = !status || cardStatus === status;
        card.style.display = matchesSearch && matchesStatus ? '' : 'none';
    });
}
</script>
</body>
</html>
