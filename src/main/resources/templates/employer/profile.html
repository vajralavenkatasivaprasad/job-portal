<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Company Profile – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="dashboard-body">
<nav class="navbar navbar-dashboard">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/employer/dashboard}" class="nav-link">Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="flash-container" th:if="${success}"><div class="flash flash-success" th:text="${success}"></div></div>
<div class="dashboard-layout">
    <aside class="dash-sidebar">
        <nav class="dash-nav" style="margin-top:16px">
            <a th:href="@{/employer/dashboard}" class="dash-nav-item">🏠 Dashboard</a>
            <a th:href="@{/employer/jobs}" class="dash-nav-item">💼 My Jobs</a>
            <a th:href="@{/employer/jobs/new}" class="dash-nav-item">➕ Post New Job</a>
            <a th:href="@{/employer/profile}" class="dash-nav-item active">🏢 Company Profile</a>
        </nav>
    </aside>
    <main class="dash-main">
        <div class="dash-welcome"><h1>Company Profile</h1></div>
        <div class="form-card">
            <h2>Contact & Company Information</h2>
            <form th:action="@{/employer/profile}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Contact Name</label>
                        <input type="text" name="fullName" th:value="${user.fullName}" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" th:value="${user.phone}" class="form-input">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="companyName" th:value="${user.companyName}" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Industry</label>
                        <input type="text" name="industry" th:value="${user.industry}" class="form-input" placeholder="e.g. IT Software">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Company Website</label>
                    <input type="url" name="companyWebsite" th:value="${user.companyWebsite}" class="form-input" placeholder="https://yourcompany.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" th:value="${user.location}" class="form-input" placeholder="City, State">
                </div>
                <div class="form-group">
                    <label class="form-label">Company Description</label>
                    <textarea name="companyDescription" class="form-input" rows="6"
                              th:text="${user.companyDescription}"
                              placeholder="Tell candidates about your company culture, mission, and what makes you unique..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Save Profile</button>
            </form>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
