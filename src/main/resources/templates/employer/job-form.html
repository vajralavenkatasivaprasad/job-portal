<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${job.id != null} ? 'Edit Job' : 'Post New Job'">Job Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="dashboard-body">
<nav class="navbar navbar-dashboard">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/employer/jobs}" class="nav-link">← My Jobs</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="flash-container" th:if="${error}"><div class="flash flash-error" th:text="${error}"></div></div>
<div class="dashboard-layout">
    <aside class="dash-sidebar">
        <nav class="dash-nav" style="margin-top:16px">
            <a th:href="@{/employer/dashboard}" class="dash-nav-item">🏠 Dashboard</a>
            <a th:href="@{/employer/jobs}" class="dash-nav-item">💼 My Jobs</a>
            <a th:href="@{/employer/jobs/new}" class="dash-nav-item active">➕ Post New Job</a>
            <a th:href="@{/employer/profile}" class="dash-nav-item">🏢 Company Profile</a>
        </nav>
    </aside>
    <main class="dash-main">
        <div class="dash-welcome">
            <h1 th:text="${job.id != null} ? 'Edit Job Posting' : 'Post a New Job'">Post Job</h1>
            <p>Fill in the details below to attract the right candidates.</p>
        </div>
        <div class="form-card">
            <form th:action="${job.id != null} ? @{/employer/jobs/{id}/edit(id=${job.id})} : @{/employer/jobs/new}"
                  method="post" th:object="${job}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="form-label">Job Title *</label>
                    <input type="text" th:field="*{title}" class="form-input" placeholder="e.g. Senior Java Developer" required>
                    <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Location *</label>
                        <input type="text" th:field="*{location}" class="form-input" placeholder="e.g. Bangalore / Remote" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Vacancies</label>
                        <input type="number" th:field="*{vacancies}" class="form-input" placeholder="Number of openings" min="1">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select th:field="*{category}" class="form-input" required>
                            <option value="">-- Select Category --</option>
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.name().replace('_',' ')}">Category</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Job Type *</label>
                        <select th:field="*{jobType}" class="form-input" required>
                            <option value="">-- Select Type --</option>
                            <option th:each="jt : ${jobTypes}" th:value="${jt}" th:text="${jt.name().replace('_',' ')}">Type</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Experience Level *</label>
                        <select th:field="*{experienceLevel}" class="form-input" required>
                            <option value="">-- Select Level --</option>
                            <option th:each="el : ${experienceLevels}" th:value="${el}" th:text="${el.name().replace('_',' ')}">Level</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" th:field="*{applicationDeadline}" class="form-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Minimum Salary (₹/year)</label>
                        <input type="number" id="salaryMin" th:field="*{salaryMin}" class="form-input" placeholder="e.g. 400000" oninput="updateSalaryDisplay()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Maximum Salary (₹/year)</label>
                        <input type="number" id="salaryMax" th:field="*{salaryMax}" class="form-input" placeholder="e.g. 700000" oninput="updateSalaryDisplay()">
                    </div>
                </div>
                <div id="salaryDisplay" style="color:var(--success);font-weight:700;font-size:.9rem;margin-top:-8px"></div>

                <div class="form-group">
                    <label class="form-label">Skills Required (comma-separated)</label>
                    <input type="text" th:field="*{skillsRequired}" class="form-input" placeholder="Java, Spring Boot, MySQL, REST API...">
                </div>

                <div class="form-group">
                    <label class="form-label">Job Description * (min. 50 characters)</label>
                    <textarea th:field="*{description}" class="form-input" rows="10" required
                              placeholder="Describe the role, responsibilities, requirements, and what your company offers..."></textarea>
                    <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div style="display:flex;gap:12px">
                    <button type="submit" class="btn btn-primary btn-lg"
                            th:text="${job.id != null} ? 'Update Job' : 'Publish Job'">Publish</button>
                    <a th:href="@{/employer/jobs}" class="btn btn-ghost btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
