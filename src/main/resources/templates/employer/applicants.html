<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Applicants – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="dashboard-body">
<nav class="navbar navbar-dashboard">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/employer/jobs}" class="nav-link">← My Jobs</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="flash-container" th:if="${success}"><div class="flash flash-success" th:text="${success}"></div></div>
<div class="dashboard-layout">
    <aside class="dash-sidebar">
        <nav class="dash-nav" style="margin-top:16px">
            <a th:href="@{/employer/dashboard}" class="dash-nav-item">🏠 Dashboard</a>
            <a th:href="@{/employer/jobs}" class="dash-nav-item active">💼 My Jobs</a>
            <a th:href="@{/employer/jobs/new}" class="dash-nav-item">➕ Post New Job</a>
            <a th:href="@{/employer/profile}" class="dash-nav-item">🏢 Company Profile</a>
        </nav>
    </aside>
    <main class="dash-main">
        <!-- Job info banner -->
        <div class="form-card" style="margin-bottom:24px;padding:20px 24px">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
                <div>
                    <h1 style="font-family:var(--font-head);font-size:1.4rem;font-weight:800" th:text="${job.title}">Job Title</h1>
                    <p style="color:var(--gray-500);margin-top:4px" th:text="${job.location} + ' · ' + ${job.jobType?.name().replace('_',' ')}">Details</p>
                </div>
                <div style="display:flex;gap:10px;align-items:center">
                    <span class="badge badge-success" th:text="${applications.size()} + ' applicants'">0</span>
                    <a th:href="@{/employer/jobs/{id}/edit(id=${job.id})}" class="btn btn-sm btn-ghost">Edit Job</a>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar" style="margin-bottom:16px">
            <input type="text" id="applicantSearch" class="form-input" placeholder="Search applicants..." oninput="filterApplicants()">
            <select id="statusFilter" class="form-input" onchange="filterApplicants()">
                <option value="">All Statuses</option>
                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name().replace('_',' ')}">Status</option>
            </select>
        </div>

        <div th:if="${applications.empty}" class="empty-state large">
            <div class="empty-icon">📭</div>
            <h3>No applications yet</h3>
            <p>Share the job link to attract candidates.</p>
        </div>

        <div id="applicantsContainer" th:unless="${applications.empty}">
            <div class="applicant-card" th:each="app : ${applications}"
                 th:attr="data-name=${app.applicant.fullName},data-status=${app.status.name()}">

                <div class="applicant-avatar" th:text="${app.applicant.fullName?.charAt(0)}">R</div>

                <div class="applicant-info">
                    <h3 th:text="${app.applicant.fullName}">Name</h3>
                    <p th:text="${app.applicant.email} + ' · ' + (${app.applicant.location} ?: 'Location not set')">Email</p>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
                        <span th:class="'status-badge status-' + ${app.status.name().toLowerCase().replace('_','-')}"
                              th:text="${app.status.name().replace('_',' ')}">Status</span>
                        <span class="jtag" th:text="'Applied: ' + ${#temporals.format(app.appliedAt,'dd MMM yyyy')}">Date</span>
                        <span class="jtag" th:if="${app.applicant.experience != null}"
                              th:text="'Exp: ' + ${app.applicant.experience}">Exp</span>
                    </div>
                    <div th:if="${app.applicant.skills != null}" style="margin-top:8px">
                        <span th:each="skill : ${app.applicant.skills?.split(',')}" class="skill-chip"
                              th:text="${#strings.trim(skill)}" style="font-size:.75rem">Skill</span>
                    </div>
                    <div th:if="${app.coverLetter != null}" style="margin-top:10px;background:var(--gray-50);padding:10px;border-radius:8px;font-size:.85rem;color:var(--gray-600)">
                        <strong>Cover Letter: </strong><span th:text="${#strings.abbreviate(app.coverLetter, 200)}">...</span>
                    </div>
                    <div th:if="${app.employerNote != null}" style="margin-top:6px;font-size:.82rem;color:var(--gray-500)">
                        <em>Note: </em><span th:text="${app.employerNote}">Note</span>
                    </div>
                </div>

                <div class="applicant-actions">
                    <div th:if="${app.applicant.resumePath != null}">
                        <a th:href="${app.applicant.resumePath}" target="_blank" class="btn btn-sm btn-outline">📄 Resume</a>
                    </div>
                    <!-- Status Update Form -->
                    <form th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post" class="status-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <select name="status" class="form-input" style="font-size:.82rem;padding:6px 10px">
                            <option th:each="s : ${statuses}" th:value="${s.name()}"
                                    th:text="${s.name().replace('_',' ')}"
                                    th:selected="${s == app.status}">Status</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-primary">Update</button>
                    </form>
                    <!-- Quick shortlist -->
                    <form th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="status" value="SHORTLISTED"/>
                        <button type="submit" class="btn btn-sm btn-ghost"
                                th:if="${app.status.name() != 'SHORTLISTED'}">⭐ Shortlist</button>
                    </form>
                    <form th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="status" value="REJECTED"/>
                        <button type="submit" class="btn btn-sm btn-danger-ghost"
                                th:if="${app.status.name() != 'REJECTED'}"
                                onclick="return confirm('Reject this applicant?')">✕ Reject</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script>
function filterApplicants() {
    const search = document.getElementById('applicantSearch').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    document.querySelectorAll('.applicant-card').forEach(card => {
        const name = (card.dataset.name || '').toLowerCase();
        const cardStatus = card.dataset.status || '';
        const matchSearch = name.includes(search);
        const matchStatus = !status || cardStatus === status;
        card.style.display = (matchSearch && matchStatus) ? '' : 'none';
    });
}
</script>
</body>
</html>
