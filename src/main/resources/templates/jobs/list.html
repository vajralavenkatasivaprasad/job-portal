<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Browse Jobs – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand"><span class="brand-icon">◈</span><span>JobPortal</span></a>
        <div class="nav-links">
            <a th:href="@{/jobs}" class="nav-link nav-active">Browse Jobs</a>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-link">Login</a>
                <a th:href="@{/register}" class="btn btn-primary btn-sm">Get Started</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="nav-auth">
                <span sec:authorize="hasRole('STUDENT')"><a th:href="@{/student/dashboard}" class="nav-link">Dashboard</a></span>
                <span sec:authorize="hasRole('EMPLOYER')"><a th:href="@{/employer/dashboard}" class="nav-link">Dashboard</a></span>
                <span sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/dashboard}" class="nav-link">Admin</a></span>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="flash-container" th:if="${error}">
    <div class="flash flash-error" th:text="${error}"></div>
</div>
<div class="flash-container" th:if="${success}">
    <div class="flash flash-success" th:text="${success}"></div>
</div>

<div class="page-header">
    <div class="page-header-content">
        <h1>Browse Jobs</h1>
        <p th:text="${totalElements} + ' jobs found'">0 jobs found</p>
    </div>
</div>

<div class="jobs-layout">
    <!-- FILTERS -->
    <aside class="filter-panel">
        <div class="filter-header">
            <h3>Filters</h3>
            <a href="/jobs" class="filter-clear">Clear All</a>
        </div>
        <form action="/jobs" method="get" id="filterForm">
            <div class="filter-group">
                <label class="filter-label">Keyword</label>
                <input type="text" name="keyword" th:value="${keyword}" class="form-input" placeholder="Title, skill, company...">
            </div>
            <div class="filter-group">
                <label class="filter-label">Location</label>
                <input type="text" name="location" th:value="${location}" class="form-input" placeholder="City or Remote">
            </div>
            <div class="filter-group">
                <label class="filter-label">Category</label>
                <select name="category" class="form-input">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.name().replace('_',' ')}"
                            th:selected="${cat == selectedCategory}">Category</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Job Type</label>
                <select name="jobType" class="form-input">
                    <option value="">All Types</option>
                    <option th:each="jt : ${jobTypes}" th:value="${jt}" th:text="${jt.name().replace('_',' ')}"
                            th:selected="${jt == selectedJobType}">Type</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Experience Level</label>
                <select name="experienceLevel" class="form-input">
                    <option value="">All Levels</option>
                    <option th:each="el : ${experienceLevels}" th:value="${el}" th:text="${el.name().replace('_',' ')}"
                            th:selected="${el == selectedExperience}">Level</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Apply Filters</button>
        </form>
    </aside>

    <!-- JOB LIST -->
    <main class="jobs-main">
        <div th:if="${jobs != null and !jobs.empty}">
            <div class="job-card-row" th:each="job : ${jobs}">
                <div class="job-card-row-left">
                    <div class="job-company-icon lg" th:text="${job.companyName?.charAt(0)}">T</div>
                    <div class="job-info">
                        <h3 class="job-title-row">
                            <a th:href="@{/jobs/{id}(id=${job.id})}" th:text="${job.title}">Title</a>
                        </h3>
                        <p class="job-company-row" th:text="${job.companyName}">Company</p>
                        <div class="job-tags">
                            <span class="jtag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> <span th:text="${job.location}">Location</span></span>
                            <span class="jtag" th:text="${job.jobType?.name().replace('_',' ')}">Type</span>
                            <span class="jtag" th:text="${job.experienceLevel?.name().replace('_',' ')}">Level</span>
                            <span class="jtag cat-badge" th:text="${job.category?.name().replace('_',' ')}">Category</span>
                        </div>
                    </div>
                </div>
                <div class="job-card-row-right">
                    <div class="job-salary-row" th:if="${job.salaryMin != null}"
                         th:text="'₹' + ${#numbers.formatDecimal(job.salaryMin/100000,1,'POINT',1,'POINT')} + 'L – ₹' + ${#numbers.formatDecimal(job.salaryMax/100000,1,'POINT',1,'POINT')} + 'L'">
                    </div>
                    <div class="job-deadline" th:if="${job.applicationDeadline != null}"
                         th:text="'Deadline: ' + ${#temporals.format(job.applicationDeadline, 'dd MMM yyyy')}"></div>
                    <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-primary btn-sm">View & Apply</a>
                </div>
            </div>

            <!-- PAGINATION -->
            <div class="pagination" th:if="${totalPages > 1}">
                <a th:href="@{/jobs(keyword=${keyword},location=${location},category=${selectedCategory},jobType=${selectedJobType},experienceLevel=${selectedExperience},page=${currentPage - 1})}"
                   th:class="${currentPage == 0} ? 'page-btn disabled' : 'page-btn'">&laquo; Prev</a>
                <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/jobs(keyword=${keyword},location=${location},category=${selectedCategory},jobType=${selectedJobType},experienceLevel=${selectedExperience},page=${i})}"
                       th:text="${i + 1}"
                       th:class="${i == currentPage} ? 'page-btn active' : 'page-btn'">1</a>
                </span>
                <a th:href="@{/jobs(keyword=${keyword},location=${location},category=${selectedCategory},jobType=${selectedJobType},experienceLevel=${selectedExperience},page=${currentPage + 1})}"
                   th:class="${currentPage == totalPages - 1} ? 'page-btn disabled' : 'page-btn'">Next &raquo;</a>
            </div>
        </div>

        <div th:if="${jobs == null or jobs.empty}" class="empty-state large">
            <div class="empty-icon">🔍</div>
            <h3>No jobs found</h3>
            <p>Try adjusting your filters or search terms.</p>
            <a href="/jobs" class="btn btn-primary">Clear Filters</a>
        </div>
    </main>
</div>

<footer class="footer">
    <div class="footer-container">
        <p>© 2025 JobPortal</p>
    </div>
</footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
